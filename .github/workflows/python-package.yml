name: Test WeChat Work Notification

on:
  workflow_dispatch:

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - name: Send Message to WeChat Work
        run: |
          WEBHOOK_URL="${{ secrets.WECHAT_WEBHOOK }}"
          
          # 获取当前时间
          CURRENT_TIME=$(date +"%Y-%m-%d %H:%M:%S")
          
          # 发送请求 (注意：这里使用了更安全的变量拼接方式)
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"msgtype\": \"text\",
              \"text\": {
                \"content\": \"🚀 [GitHub Actions 测试]\\n\\n你好，这是一条测试消息。\\n如果看到这条消息，说明连接成功！\\n\\n✅ 关键词：测试\\n⏰ 时间：$CURRENT_TIME\"
              }
            }"
